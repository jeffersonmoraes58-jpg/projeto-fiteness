worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 210M;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript
             application/xml+rss application/atom+xml image/svg+xml;
  gzip_min_length 256;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  # Docker's internal DNS — re-resolves container IPs dynamically (valid=10s)
  # This prevents 502 errors when watchtower recreates containers with new IPs
  resolver 127.0.0.11 valid=10s ipv6=off;

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name fitlynutri.com.br www.fitlynutri.com.br;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl http2;
    server_name fitlynutri.com.br www.fitlynutri.com.br;

    ssl_certificate /etc/letsencrypt/live/fitlynutri.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fitlynutri.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Content Security Policy — permite iframes do YouTube e Vimeo
    add_header Content-Security-Policy "frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com https://player.vimeo.com; frame-ancestors 'self';" always;

    limit_conn conn 20;

    # hostname-only variables trigger the resolver above per request
    set $api_host api;
    set $web_host web;

    # Auth endpoints — strict rate limiting
    location /api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://$api_host:4000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI routes — longer timeout for LLM calls
    location /api/v1/ai/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://$api_host:4000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 180s;
      proxy_connect_timeout 10s;
      proxy_send_timeout 180s;
    }

    # MuscleWiki stream proxy — no buffering for video streaming
    location /api/v1/musclewiki/stream/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://$api_host:4000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_connect_timeout 10s;
      proxy_send_timeout 300s;
    }

    # API routes
    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://$api_host:4000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 90s;
      proxy_connect_timeout 10s;
    }

    # WebSocket (Socket.io) — long-lived connections
    location /socket.io/ {
      proxy_pass http://$api_host:4000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Digital Asset Links — TWA verification (served inline, sem depender do Next.js)
    location = /.well-known/assetlinks.json {
      add_header Content-Type "application/json" always;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "public, max-age=3600" always;
      return 200 '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.fitlynutri.app","sha256_cert_fingerprints":["88:6F:7A:63:4E:02:D4:BB:88:05:2B:3C:51:C0:68:41:BD:D2:CC:22:1D:E5:CC:8B:D9:40:99:01:14:CA:F8:65"]}}]';
    }

    # Next.js static assets — long cache
    location /_next/static/ {
      proxy_pass http://$web_host:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Frontend
    location / {
      proxy_pass http://$web_host:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }
}
