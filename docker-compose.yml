version: '3.9'

services:
  # ================================================
  # PostgreSQL Database
  # ================================================
  postgres:
    image: postgres:16-alpine
    container_name: fitsaas-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fitsaas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitsaas-network

  # ================================================
  # Redis Cache & Queue
  # ================================================
  redis:
    image: redis:7-alpine
    container_name: fitsaas-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitsaas-network

  # ================================================
  # NestJS API
  # ================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fitsaas-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-fitsaas}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitsaas-network

  # ================================================
  # Next.js Web App
  # ================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
    container_name: fitsaas-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - fitsaas-network

  # ================================================
  # Nginx Reverse Proxy
  # ================================================
  nginx:
    image: nginx:alpine
    container_name: fitsaas-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - fitsaas-network

  # ================================================
  # PgAdmin (Development only)
  # ================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fitsaas-pgadmin
    restart: unless-stopped
    profiles: ['dev']
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fitsaas.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - fitsaas-network

volumes:
  postgres_data:
  redis_data:

networks:
  fitsaas-network:
    driver: bridge
